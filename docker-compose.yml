services:
  mysql:
    image: mysql:8.0
    container_name: task_management_db
    restart: always
    environment:
      MYSQL_DATABASE: task_management
      MYSQL_USER: ${DB_USERNAME:-taskuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-taskpass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: ./api
    container_name: task_management_app
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_USERNAME: ${DB_USERNAME:-taskuser}
      DB_PASSWORD: ${DB_PASSWORD:-taskpass}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/task_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
